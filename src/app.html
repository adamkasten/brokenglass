<html lang="en">
	<head>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">

		background: var(--bg);

	@media (width <= 1300px) {

		width: 100px;
	}

	.nav_button {
		padding: 10px 10px;
		font-size: 1rem;
	}

		font-size: 2em;
